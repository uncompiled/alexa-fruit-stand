service: alexa-fruit-stand
provider:
  name: aws
  runtime: nodejs24.x
  stage: v2
  region: us-east-1
package:
  patterns:
    - src/**
    - node_modules/pluralize/**
    - '!.git/**'
    - '!.github/**'
    - '!.serverless/**'
    - '!icons/**'
    - '!speechAssets/**'
    - '!test/**'
functions:
  skill:
    handler: src/index.handler
    logRetentionInDays: 1
